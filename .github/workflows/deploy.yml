name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Since you are using a custom domain (raosengineering.com), base href must be /
        run: npm run build -- --base-href /

      - name: Copy index.html to 404.html (For SPA Routing)
        run: cp dist/raoengineering-v2/browser/index.html dist/raoengineering-v2/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the specific browser output directory created by Angular 17+
          path: './dist/raoengineering-v2/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
